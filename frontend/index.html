<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PokerMate — 德州扑克 AI 陪练</title>
<style>
  /* ═══════════════════════════════════════════
     Apple Design Language — Light Theme
     Cloud Design inspired: glass, airy, human
     ═══════════════════════════════════════════ */
  :root {
    --bg-primary: #f5f5f7;
    --bg-secondary: #ffffff;
    --bg-tertiary: #fafafa;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent-blue: #0071e3;
    --accent-green: #34c759;
    --accent-orange: #ff9500;
    --accent-red: #ff3b30;
    --accent-purple: #af52de;
    --accent-teal: #5ac8fa;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.12);
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 22px;
    --radius-xl: 28px;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font);
    min-height: 100dvh;
    line-height: 1.5;
    letter-spacing: -0.01em;
  }

  /* ── Layout ── */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 20px 40px;
  }

  /* ── Glass Card ── */
  .glass-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    transition: all 0.2s ease;
  }
  .glass-card.interactive:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 24px;
  }
  .greeting { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .greeting .wave { display:inline-block; animation: wave .8s ease-in-out 3; }
  @keyframes wave {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(15deg); }
    75% { transform: rotate(-10deg); }
  }
  .header-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0071e3, #5ac8fa);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 1.1rem;
    box-shadow: 0 2px 8px rgba(0,113,227,0.25);
    cursor: pointer;
    transition: transform .2s;
  }
  .header-avatar:active { transform: scale(0.95); }
  .date-today { font-size: 0.85rem; color: var(--text-secondary); margin-top: -8px; }

  /* ── Quote Banner ── */
  .quote-banner {
    background: linear-gradient(135deg, #e8f4fd 0%, #f0e6f9 50%, #e6f9f0 100%);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    margin: 20px 0;
    position: relative;
    overflow: hidden;
  }
  .quote-banner .quote-text {
    font-size: 0.95rem;
    font-weight: 500;
    color: #1d1d1f;
    position: relative;
    z-index: 1;
    line-height: 1.6;
  }
  .quote-banner .quote-author {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .quote-banner::after {
    content: '';
    position: absolute;
    top: -30px; right: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    z-index: 0;
  }

  /* ── Streak Bar ── */
  .streak-bar {
    display: flex;
    gap: 8px;
    margin: 16px 0 24px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .streak-dot {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 600;
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    transition: all .3s;
  }
  .streak-dot.done {
    background: var(--accent-green);
    border-color: var(--accent-green);
    color: #fff;
  }
  .streak-dot.today {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
  }
  .streak-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 4px;
  }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  @media (min-width: 600px) {
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .stat-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 18px 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    margin-bottom: 10px;
  }
  .stat-icon.blue { background: rgba(0,113,227,0.1); }
  .stat-icon.green { background: rgba(52,199,89,0.1); }
  .stat-icon.purple { background: rgba(175,82,222,0.1); }
  .stat-icon.orange { background: rgba(255,149,0,0.1); }
  .stat-card .stat-value {
    font-size: 1.5rem; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .stat-card .stat-label {
    font-size: 0.78rem; color: var(--text-secondary);
    margin-top: 2px;
  }
  .stat-card .stat-change {
    font-size: 0.7rem; font-weight: 600;
    margin-top: 6px;
  }
  .stat-change.up { color: var(--accent-green); }
  .stat-change.down { color: var(--accent-red); }

  /* ── Section Title ── */
  .section-title {
    font-size: 1.15rem; font-weight: 700;
    margin: 28px 0 14px;
    letter-spacing: -0.01em;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    font-size: 0.75rem; font-weight: 500;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    padding: 2px 10px; border-radius: 12px;
  }

  /* ── CTA Button ── */
  .btn-cta {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    padding: 16px 24px;
    border-radius: var(--radius-md);
    background: var(--accent-blue);
    color: #fff;
    font-size: 1rem; font-weight: 600;
    border: none;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: all .2s;
    box-shadow: 0 4px 16px rgba(0,113,227,0.2);
  }
  .btn-cta:active { transform: scale(0.98); }
  .btn-cta.secondary {
    background: var(--bg-secondary);
    color: var(--accent-blue);
    border: 1.5px solid var(--accent-blue);
    box-shadow: none;
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .2s ease-out;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-sheet {
    background: var(--bg-secondary);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    width: 100%; max-width: 600px; max-height: 85dvh;
    overflow-y: auto;
    padding: 12px 24px 36px;
    box-shadow: var(--shadow-lg);
    animation: slideUp .3s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 5px;
    border-radius: 3px;
    background: var(--border-strong);
    margin: 0 auto 16px;
  }
  .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; }

  /* ── Form Controls ── */
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 0.8rem; font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-select, .form-input {
    width: 100%;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--bg-tertiary);
    font-size: 0.95rem;
    font-family: var(--font);
    color: var(--text-primary);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .2s;
    cursor: pointer;
  }
  .form-select:focus, .form-input:focus {
    outline: none;
    border-color: var(--accent-blue);
  }
  .form-select {
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236e6e73' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 16px center;
    padding-right: 40px;
  }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .toggle-row .toggle-label { font-size: 0.9rem; font-weight: 500; }
  .toggle-row .toggle-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px; }

  /* Toggle Switch */
  .toggle {
    width: 51px; height: 31px;
    border-radius: 16px;
    background: #e0e0e0;
    position: relative;
    cursor: pointer;
    transition: background .3s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent-green); }
  .toggle::after {
    content: '';
    position: absolute;
    width: 27px; height: 27px;
    border-radius: 50%;
    background: #fff;
    top: 2px; left: 2px;
    transition: transform .3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .toggle.on::after { transform: translateX(20px); }

  /* ── History List ── */
  .history-list {
    display: flex; flex-direction: column; gap: 8px;
  }
  .history-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all .2s;
  }
  .history-item:active { background: var(--bg-tertiary); }
  .history-item .hi-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .hi-icon.win { background: rgba(52,199,89,0.1); }
  .hi-icon.lose { background: rgba(255,59,48,0.08); }
  .hi-info { flex:1; min-width:0; }
  .hi-info .hi-title { font-weight: 600; font-size: 0.9rem; }
  .hi-info .hi-meta { font-size: 0.73rem; color: var(--text-secondary); margin-top: 1px; }
  .hi-score { font-weight: 700; font-size: 1rem; }
  .hi-score.good { color: var(--accent-green); }
  .hi-score.ok { color: var(--accent-orange); }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--text-secondary);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── Radar Mini ── */
  .skill-chart {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 20px;
    border: 1px solid var(--border);
    margin: 12px 0;
  }
  .skill-bars { display:flex; flex-direction: column; gap: 10px; }
  .skill-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.78rem;
  }
  .skill-row .skill-name { width: 55px; text-align: right; color: var(--text-secondary); flex-shrink:0; }
  .skill-row .skill-track {
    flex:1; height: 6px; border-radius: 3px;
    background: #e8e8ed; overflow: hidden;
  }
  .skill-row .skill-fill {
    height: 100%; border-radius: 3px;
    transition: width .6s ease-out;
  }

  .link-small { font-size: 0.8rem; color: var(--accent-blue); text-decoration: none; font-weight: 500; }
  .link-small:hover { text-decoration: underline; }

  @media (max-width: 500px) {
    .container { padding: 14px 14px 32px; }
    .greeting { font-size: 1.3rem; }
    .stats-grid { gap: 8px; }
    .stat-card { padding: 14px 12px; }
    .stat-card .stat-value { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="greeting">你好, <span id="user-name">牌手</span> <span class="wave">👋</span></div>
      <div class="date-today" id="date-display"></div>
    </div>
    <div class="header-avatar" id="avatar-initial" onclick="App.editProfile()">P</div>
  </div>

  <!-- Encouragement Quote -->
  <div class="quote-banner" id="quote-banner">
    <div class="quote-text" id="quote-text">每一手牌都是一次学习。今天的你会比昨天更强。</div>
    <div class="quote-author">— 学习统计基于你的训练数据</div>
  </div>

  <!-- Weekly Streak -->
  <div style="overflow-x:auto">
    <div class="streak-bar" id="streak-bar"></div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon blue">🃏</div>
      <div class="stat-value" id="stat-hands">0</div>
      <div class="stat-label">总手数</div>
      <div class="stat-change up" id="stat-today-hands">今日 +0</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">📈</div>
      <div class="stat-value" id="stat-score">--</div>
      <div class="stat-label">平均评分</div>
      <div class="stat-change up" id="stat-score-change">+0 近7天</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon purple">🎯</div>
      <div class="stat-value" id="stat-focus">--</div>
      <div class="stat-label">训练重点</div>
      <div class="stat-change" style="color:var(--accent-purple)" id="stat-focus-detail">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🔥</div>
      <div class="stat-value" id="stat-streak">0天</div>
      <div class="stat-label">连续训练</div>
      <div class="stat-change" style="color:var(--accent-orange)" id="stat-best-streak">最佳 0天</div>
    </div>
  </div>

  <!-- New Match Button -->
  <button class="btn-cta" onclick="App.openNewMatch()" style="margin-top:8px">
    <span>+</span> 新建一场比赛
  </button>

  <!-- Quick resume -->
  <button class="btn-cta secondary" onclick="App.quickResume()" style="margin-top:8px" id="btn-resume" hidden>
    ▶ 继续上次训练
  </button>

  <!-- Recent History -->
  <div class="section-title">
    最近牌局 <span class="count" id="history-count">0</span>
  </div>
  <div class="history-list" id="history-list">
    <div class="empty-state">
      <div class="empty-icon">🂠</div>
      <div>还没有牌局记录</div>
      <div style="font-size:0.78rem;margin-top:4px">完成一局比赛后会自动出现在这里</div>
    </div>
  </div>

  <!-- Skill Progress -->
  <div class="section-title">技能进度</div>
  <div class="skill-chart">
    <div class="skill-bars" id="skill-bars">
      <!-- Filled by JS -->
    </div>
  </div>
  <div style="text-align:right;margin-top:4px">
    <a class="link-small" href="game.html">查看详细复盘 →</a>
  </div>

  <!-- Bottom spacer -->
  <div style="height:60px"></div>
</div>

<!-- ═══ New Match Modal ═══ -->
<div class="modal-overlay" id="modal-overlay" hidden onclick="App.closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">新建比赛</div>

    <div class="form-group">
      <label class="form-label">AI 难度</label>
      <select class="form-select" id="cfg-difficulty">
        <option value="1">🟢 初级 — 基础起手牌策略</option>
        <option value="2" selected>🟡 中级 — 位置+赔率意识</option>
        <option value="3">🔴 高级 — GTO 近似 + 混合策略</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">对手人数</label>
      <select class="form-select" id="cfg-opponents">
        <option value="2">2人 (单挑 Heads-up)</option>
        <option value="3">3人</option>
        <option value="6" selected>6人 (标准桌)</option>
        <option value="9">9人 (满桌)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">起始筹码 (BB)</label>
      <select class="form-select" id="cfg-stack">
        <option value="500">500 BB (浅码)</option>
        <option value="1000" selected>1000 BB (标准)</option>
        <option value="2000">2000 BB (深码)</option>
      </select>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">上帝模式</div>
        <div class="toggle-desc">透视所有对手底牌</div>
      </div>
      <div class="toggle on" id="tog-god" onclick="App.toggleSwitch('tog-god')"></div>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">AI 实时提示</div>
        <div class="toggle-desc">每步给出建议和胜率分析</div>
      </div>
      <div class="toggle on" id="tog-coach" onclick="App.toggleSwitch('tog-coach')"></div>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">赛后自动复盘</div>
        <div class="toggle-desc">结束后自动弹出5维评分</div>
      </div>
      <div class="toggle on" id="tog-auto-review" onclick="App.toggleSwitch('tog-auto-review')"></div>
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-label">记录到历史</div>
        <div class="toggle-desc">保存牌局到学习统计</div>
      </div>
      <div class="toggle on" id="tog-record" onclick="App.toggleSwitch('tog-record')"></div>
    </div>

    <button class="btn-cta" onclick="App.startMatch()" style="margin-top:20px">
      开始比赛
    </button>
    <button class="btn-cta secondary" onclick="App.closeModal()" style="margin-top:8px">
      取消
    </button>
  </div>
</div>

<!-- ═══ Edit Profile Modal ═══ -->
<div class="modal-overlay" id="profile-modal" hidden onclick="App.closeProfileModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">编辑资料</div>
    <div class="form-group">
      <label class="form-label">昵称</label>
      <input class="form-input" id="profile-nickname" placeholder="输入你的昵称" maxlength="20">
    </div>
    <button class="btn-cta" onclick="App.saveProfile()">保存</button>
    <button class="btn-cta secondary" onclick="App.closeProfileModal()" style="margin-top:8px">取消</button>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
